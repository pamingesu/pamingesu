<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ポケモンスリープ アメ計算ツール</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,sans-serif;background:#f0fdf9;color:#1a1a1a;padding:16px;max-width:720px;margin:0 auto}
/* top bar */
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.page-title{font-size:18px;font-weight:700;color:#0F6E56;display:flex;align-items:center;gap:6px}
.top-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn-new{display:flex;align-items:center;gap:5px;height:36px;padding:0 16px;border-radius:20px;border:none;background:#1D9E75;color:#fff;font-size:13px;font-weight:600;cursor:pointer;box-shadow:0 2px 8px rgba(29,158,117,.3);transition:background .15s}
.btn-new:hover{background:#0F6E56}
.btn-io{display:flex;align-items:center;gap:5px;height:36px;padding:0 14px;border-radius:20px;border:1.5px solid #6ee7b7;background:#fff;color:#0F6E56;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s}
.btn-io:hover{background:#f0fdf9}
/* card */
.pcard{border-radius:14px;border:1.5px solid #b2e8d5;background:#fff;overflow:hidden;margin-bottom:10px;transition:border-color .15s,box-shadow .15s}
.pcard.checked{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.18)}
.pcard-header{display:flex;align-items:center;gap:10px;padding:11px 14px}
.pcard-header-left{display:flex;align-items:center;gap:10px;flex:1;min-width:0;cursor:pointer}
.pcard-header-left:hover .pcard-avatar{background:#d1fae5}
.pcard-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:#e1f5ee;transition:background .15s}
.pcard-name{font-size:14px;font-weight:600;color:#1a1a1a}
.pcard-meta{font-size:11px;color:#6b7280;margin-top:1px}
.badge{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:600;padding:3px 8px;border-radius:999px}
.badge-candy{background:#dcfce7;color:#15803d}
.badge-yume{background:#ede9fe;color:#5b21b6}
.badge-nc{background:#f3f4f6;color:#9ca3af}
.chevron{font-size:14px;color:#9ca3af;transition:transform .2s;flex-shrink:0;cursor:pointer;padding:4px}
.chevron.open{transform:rotate(180deg)}
/* checkbox */
.chk-wrap{display:flex;align-items:center;flex-shrink:0}
.chk-wrap input[type=checkbox]{width:18px;height:18px;accent-color:#1D9E75;cursor:pointer}
/* body */
.pcard-body{border-top:1px solid #d1fae5;padding:16px 14px;display:none;background:linear-gradient(to bottom,#f0fdf9,#fff)}
.pcard-body.open{display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 16px;margin-bottom:12px}
.form-field{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:12px;color:#6b7280;font-weight:500}
select,input[type=number],input[type=text]{height:34px;padding:0 10px;border-radius:8px;border:1px solid #bbf7d0;background:#fff;color:#1a1a1a;font-size:13px;width:100%;outline:none}
select:focus,input:focus{border-color:#1D9E75;box-shadow:0 0 0 2px rgba(29,158,117,.15)}
/* segment */
.seg-section-title{font-size:12px;font-weight:600;color:#0F6E56;margin:10px 0 6px}
.seg-row{display:flex;align-items:center;gap:6px;padding:6px 0;border-bottom:1px solid #d1fae5;flex-wrap:wrap}
.seg-row:last-child{border-bottom:none}
.btn-del-seg{width:26px;height:26px;border-radius:50%;border:1px solid #fca5a5;background:transparent;color:#ef4444;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.btn-del-seg:hover{background:#fee2e2}
.btn-add-seg{display:inline-flex;align-items:center;gap:4px;height:28px;padding:0 12px;border-radius:8px;border:1px dashed #6ee7b7;background:#f0fdf9;color:#0F6E56;font-size:12px;cursor:pointer;margin-top:6px;font-weight:500}
.btn-add-seg:hover{background:#d1fae5}
/* card actions */
.pcard-actions{display:flex;gap:8px;margin-top:14px}
.btn-calc{flex:1;height:36px;border-radius:10px;border:none;background:#1D9E75;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-calc:hover{background:#0F6E56}
.btn-del-poke{height:36px;padding:0 14px;border-radius:10px;border:1px solid #fca5a5;background:transparent;color:#ef4444;font-size:12px;cursor:pointer;font-weight:500}
.btn-del-poke:hover{background:#fee2e2}
/* result */
.result-box{margin-top:12px;padding:12px;background:#f0fdf9;border-radius:10px;border:1px solid #6ee7b7}
.result-row{display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:#4b5563;flex-wrap:wrap;gap:4px}
.result-row b{color:#0F6E56}
.result-big{display:flex;gap:10px;margin-bottom:8px}
.result-metric{flex:1;background:#fff;border-radius:8px;padding:10px 12px;border:1px solid #bbf7d0}
.result-metric-label{font-size:11px;color:#6b7280;margin-bottom:2px}
.result-metric-val{font-size:20px;font-weight:700}
.rm-candy{color:#15803d}
.rm-yume{color:#5b21b6}
/* total */
.total-card{border-radius:14px;background:linear-gradient(135deg,#dcfce7,#ede9fe);border:2px solid #6ee7b7;padding:16px 18px;margin-top:4px}
.total-title{font-size:14px;color:#0F6E56;font-weight:700;margin-bottom:10px}
.total-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.total-metric{background:rgba(255,255,255,.75);border-radius:10px;padding:10px 14px}
.total-metric-label{font-size:11px;color:#4b5563;margin-bottom:2px}
.total-metric-val{font-size:22px;font-weight:700}
.tv-candy{color:#15803d}
.tv-yume{color:#5b21b6}
.total-rows{font-size:12px;color:#4b5563}
.total-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(0,0,0,.06);gap:8px;flex-wrap:wrap}
.total-row:last-child{border-bottom:none}
.total-notice{font-size:12px;color:#6b7280;margin-top:8px;padding-top:8px;border-top:1px solid rgba(0,0,0,.08)}
/* emoji */
.emoji-picker{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.emoji-btn{width:32px;height:32px;border-radius:50%;border:2px solid transparent;background:#f0fdf9;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.emoji-btn.sel{border-color:#1D9E75;background:#d1fae5}
/* empty */
.empty-state{text-align:center;padding:48px 20px;color:#6b7280;font-size:13px;background:#fff;border-radius:14px;border:1.5px dashed #6ee7b7}
.empty-icon{font-size:44px;margin-bottom:10px}
/* radio */
.radio-group{display:flex;gap:10px;flex-wrap:wrap}
.radio-group label{font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;color:#374151}
/* boost badges */
.badge-boost{background:#dcfce7;color:#15803d;font-size:10px;padding:2px 7px;border-radius:999px}
.badge-none-sm{background:#f3f4f6;color:#6b7280;font-size:10px;padding:2px 7px;border-radius:999px}
/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:999;padding:16px}
.modal{background:#fff;border-radius:16px;width:100%;max-width:480px;padding:20px;box-shadow:0 8px 32px rgba(0,0,0,.18)}
.modal-title{font-size:15px;font-weight:700;color:#0F6E56;margin-bottom:12px}
.modal-body{font-size:13px;color:#374151;margin-bottom:16px;line-height:1.6}
.modal-actions{display:flex;gap:8px;justify-content:flex-end}
.modal textarea{width:100%;height:140px;font-size:12px;font-family:monospace;border:1px solid #bbf7d0;border-radius:8px;padding:10px;resize:vertical;outline:none}
.modal textarea:focus{border-color:#1D9E75}
.btn-modal-ok{height:34px;padding:0 18px;border-radius:8px;border:none;background:#1D9E75;color:#fff;font-size:13px;font-weight:600;cursor:pointer}
.btn-modal-ok:hover{background:#0F6E56}
.btn-modal-cancel{height:34px;padding:0 14px;border-radius:8px;border:1px solid #d1d5db;background:#fff;color:#374151;font-size:13px;cursor:pointer}
.btn-modal-cancel:hover{background:#f9fafb}
</style>
</head>
<body>

<div class="top-bar">
  <div class="page-title">🌙 アメ・ゆめのかけら 計算</div>
  <div class="top-actions">
    <button class="btn-io" onclick="exportData()">📤 エクスポート</button>
    <button class="btn-io" onclick="openImport()">📥 インポート</button>
    <button class="btn-new" onclick="addPokemon()">＋ 追加</button>
  </div>
</div>

<div id="poke-list"></div>
<div id="total-area" style="margin-top:4px"></div>

<!-- Import modal -->
<div class="modal-overlay" id="import-modal" style="display:none" onclick="closeImportOnOverlay(event)">
  <div class="modal">
    <div class="modal-title">📥 インポート</div>
    <div class="modal-body">エクスポートで保存したJSONテキストを貼り付けてください。<br><span style="color:#ef4444;font-weight:600">※ 現在のデータは上書きされます。</span></div>
    <textarea id="import-text" placeholder='{"version":1,"pokemons":[...]}'></textarea>
    <div class="modal-actions" style="margin-top:12px">
      <button class="btn-modal-cancel" onclick="closeImport()">キャンセル</button>
      <button class="btn-modal-ok" onclick="doImport()">インポートする</button>
    </div>
  </div>
</div>

<script>
const EXP_TABLE={2:54,3:71,4:108,5:128,6:164,7:202,8:244,9:274,10:315,11:345,12:376,13:407,14:419,15:429,16:440,17:454,18:469,19:483,20:497,21:515,22:537,23:558,24:579,25:600,26:622,27:643,28:665,29:686,30:708,31:729,32:748,33:766,34:785,35:803,36:821,37:839,38:857,39:875,40:893,41:910,42:928,43:945,44:963,45:980,46:997,47:1015,48:1032,49:1049,50:1066,51:1362,52:1562,53:1747,54:1946,55:2195,56:2279,57:2404,58:2533,59:2666,60:2806,61:2850,62:2922,63:2977,64:3029,65:3077};
const YUME_TABLE={2:14,3:18,4:22,5:27,6:30,7:34,8:39,9:44,10:48,11:50,12:52,13:53,14:56,15:59,16:62,17:66,18:68,19:71,20:74,21:78,22:81,23:85,24:88,25:92,26:95,27:100,28:105,29:111,30:117,31:122,32:126,33:130,34:136,35:143,36:151,37:160,38:167,39:174,40:184,41:192,42:201,43:211,44:221,45:227,46:236,47:250,48:264,49:279,50:295,51:309,52:323,53:338,54:356,55:372,56:391,57:437,58:486,59:538,60:593,61:651,62:698,63:750,64:804,65:866};
const EMOJIS=['🐢','🦊','🐧','🐸','🐼','🦆','🐻','🐨','🦁','🐯','🐰','🐹','🐭','🐱','🐶','🐮','🐷','🦋','🦄','⭐'];

function candyExp(lv){return lv<=25?35:lv<=30?30:25;}

let pokemons=[];
let nextId=1;

/* ─── add / delete / toggle ─── */
function addPokemon(){
  const id=nextId++;
  pokemons.push({id,name:'',emoji:EMOJIS[(id-1)%EMOJIS.length],curLv:14,goalLv:50,remExp:'',nature:'1',expType:'1',segments:[{from:14,to:50,boost:4}],open:true,checked:true,result:null});
  renderAll();
  setTimeout(()=>{const el=document.getElementById('name-'+id);if(el)el.focus();},50);
}
function deletePokemon(id){pokemons=pokemons.filter(p=>p.id!==id);renderAll();}
function toggleCard(id){const p=pokemons.find(x=>x.id===id);if(p){p.open=!p.open;renderAll();}}
function toggleCheck(id){
  const p=pokemons.find(x=>x.id===id);
  if(p){p.checked=!p.checked;renderAll();}
}

/* ─── calc ─── */
function calcPokemon(id){
  const p=pokemons.find(x=>x.id===id);
  if(!p)return;
  syncFromDOM(p);
  const cur=p.curLv,goal=p.goalLv;
  if(goal<=cur){alert('目標レベルは現在のレベルより大きくしてください');return;}
  const remExp=p.remExp===''?null:parseInt(p.remExp);
  const natureMult=parseFloat(p.nature);
  const expTypeMult=parseFloat(p.expType);
  const covered=new Set();
  const segs=[];
  p.segments.forEach(s=>{for(let lv=s.from;lv<s.to;lv++)covered.add(lv);segs.push({...s});});
  const noBoost=[];
  let start=null;
  for(let lv=cur;lv<goal;lv++){
    if(!covered.has(lv)){if(start===null)start=lv;}
    else{if(start!==null){noBoost.push({from:start,to:lv,boost:1});start=null;}}
  }
  if(start!==null)noBoost.push({from:start,to:goal,boost:1});
  const allSegs=[...segs,...noBoost].sort((a,b)=>a.from-b.from);
  let totalC=0,totalY=0;
  const breakdown=[];
  let isFirst=true;
  allSegs.forEach(seg=>{
    let c=0,y=0;
    for(let lv=seg.from;lv<seg.to;lv++){
      let needed;
      if(lv===seg.from&&isFirst&&remExp!==null)needed=remExp*expTypeMult;
      else needed=EXP_TABLE[lv+1]*expTypeMult;
      const expPerC=candyExp(lv+1)*seg.boost*natureMult;
      const cnt=Math.ceil(needed/expPerC);
      c+=cnt;
      const ym=seg.boost>1?(seg.boost-1):1;
      y+=cnt*YUME_TABLE[lv+1]*ym;
      isFirst=false;
    }
    totalC+=c;totalY+=y;
    breakdown.push({from:seg.from,to:seg.to,boost:seg.boost,c:Math.ceil(c),y:Math.ceil(y)});
  });
  p.result={totalC:Math.ceil(totalC),totalY:Math.ceil(totalY),breakdown};
  renderAll();
}

/* ─── sync DOM → data ─── */
function syncFromDOM(p){
  const nEl=document.getElementById('name-'+p.id);if(nEl)p.name=nEl.value;
  const cEl=document.getElementById('cur-'+p.id);if(cEl)p.curLv=parseInt(cEl.value);
  const gEl=document.getElementById('goal-'+p.id);if(gEl)p.goalLv=parseInt(gEl.value);
  const rEl=document.getElementById('rem-'+p.id);if(rEl)p.remExp=rEl.value;
  const nat=document.querySelector('input[name="nat-'+p.id+'"]:checked');if(nat)p.nature=nat.value;
  const et=document.querySelector('input[name="et-'+p.id+'"]:checked');if(et)p.expType=et.value;
  const fromEls=document.querySelectorAll('.seg-from-'+p.id);
  const toEls=document.querySelectorAll('.seg-to-'+p.id);
  const boostEls=document.querySelectorAll('.seg-boost-'+p.id);
  fromEls.forEach((el,i)=>{if(p.segments[i])p.segments[i].from=parseInt(el.value);});
  toEls.forEach((el,i)=>{if(p.segments[i])p.segments[i].to=parseInt(el.value);});
  boostEls.forEach((el,i)=>{if(p.segments[i])p.segments[i].boost=parseFloat(el.value);});
}

/* ─── segment ops ─── */
function addSegment(id){
  const p=pokemons.find(x=>x.id===id);if(!p)return;
  syncFromDOM(p);
  const from=p.segments.length>0?p.segments[p.segments.length-1].to:p.curLv;
  const to=Math.min(from+10,p.goalLv);
  if(from>=p.goalLv)return;
  p.segments.push({from,to,boost:4});
  renderAll();
}
function deleteSegment(id,idx){
  const p=pokemons.find(x=>x.id===id);if(!p)return;
  syncFromDOM(p);
  p.segments.splice(idx,1);
  renderAll();
}
function setEmoji(id,emoji){
  const p=pokemons.find(x=>x.id===id);if(!p)return;
  syncFromDOM(p);
  p.emoji=emoji;
  renderAll();
}

/* ─── export / import ─── */
function syncAll(){pokemons.forEach(p=>syncFromDOM(p));}

function exportData(){
  syncAll();
  const data={version:1,exported:new Date().toISOString(),pokemons:pokemons.map(p=>({
    name:p.name,emoji:p.emoji,curLv:p.curLv,goalLv:p.goalLv,remExp:p.remExp,
    nature:p.nature,expType:p.expType,segments:p.segments,checked:p.checked,result:p.result
  }))};
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='pokesleep_backup_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  URL.revokeObjectURL(url);
}

function openImport(){
  document.getElementById('import-text').value='';
  document.getElementById('import-modal').style.display='flex';
}
function closeImport(){document.getElementById('import-modal').style.display='none';}
function closeImportOnOverlay(e){if(e.target===document.getElementById('import-modal'))closeImport();}

function doImport(){
  const raw=document.getElementById('import-text').value.trim();
  let data;
  try{data=JSON.parse(raw);}catch(e){alert('JSONの形式が正しくありません。');return;}
  if(!data.pokemons||!Array.isArray(data.pokemons)){alert('データの形式が正しくありません。');return;}
  pokemons=data.pokemons.map((p,i)=>({
    id:i+1,
    name:p.name||'',
    emoji:p.emoji||EMOJIS[i%EMOJIS.length],
    curLv:p.curLv||1,
    goalLv:p.goalLv||50,
    remExp:p.remExp||'',
    nature:p.nature||'1',
    expType:p.expType||'1',
    segments:p.segments||[],
    checked:p.checked!==false,
    open:false,
    result:p.result||null
  }));
  nextId=pokemons.length+1;
  closeImport();
  renderAll();
}

/* ─── helpers ─── */
function levelOpts(min,max,sel){
  let s='';
  for(let i=min;i<=max;i++)s+=`<option value="${i}"${i===sel?' selected':''}>Lv.${i}</option>`;
  return s;
}
function boostLabel(b){return b===4?'ミニ×4':b===5?'ブースト×5':'なし';}

/* ─── render card ─── */
function renderCard(p){
  const hasResult=p.result!==null;
  const candyStr=hasResult?p.result.totalC.toLocaleString():'—';
  const yumeStr=hasResult?p.result.totalY.toLocaleString():'—';
  const displayName=p.name||'なまえ未入力';
  const avatarBg=hasResult?'#d1fae5':'#e1f5ee';
  const candyBadgeCls=hasResult?'badge-candy':'badge-nc';
  const yumeBadgeCls=hasResult?'badge-yume':'badge-nc';

  let segHtml='';
  p.segments.forEach((seg,idx)=>{
    segHtml+=`<div class="seg-row">
      <select class="seg-from-${p.id}" style="height:30px;font-size:12px;flex:1;min-width:70px">${levelOpts(p.curLv,p.goalLv-1,seg.from)}</select>
      <span style="font-size:12px;color:#9ca3af">→</span>
      <select class="seg-to-${p.id}" style="height:30px;font-size:12px;flex:1;min-width:70px">${levelOpts(p.curLv+1,p.goalLv,seg.to)}</select>
      <select class="seg-boost-${p.id}" style="height:30px;font-size:12px;flex:2;min-width:130px">
        <option value="4"${seg.boost===4?' selected':''}>ミニアメブースト (×4)</option>
        <option value="5"${seg.boost===5?' selected':''}>アメブースト (×5)</option>
      </select>
      <button class="btn-del-seg" onclick="deleteSegment(${p.id},${idx})" aria-label="削除">×</button>
    </div>`;
  });

  let resultHtml='';
  if(hasResult){
    resultHtml=`<div class="result-box">
      <div class="result-big">
        <div class="result-metric"><div class="result-metric-label">🍬 必要なアメ</div><div class="result-metric-val rm-candy">${p.result.totalC.toLocaleString()}<span style="font-size:12px;margin-left:2px">個</span></div></div>
        <div class="result-metric"><div class="result-metric-label">✨ ゆめのかけら</div><div class="result-metric-val rm-yume">${p.result.totalY.toLocaleString()}<span style="font-size:12px;margin-left:2px">個</span></div></div>
      </div>`;
    if(p.result.breakdown.length>1){
      p.result.breakdown.forEach(b=>{
        const bl=b.boost>1?`<span class="badge-boost">${boostLabel(b.boost)}</span>`:`<span class="badge-none-sm">ブーストなし</span>`;
        resultHtml+=`<div class="result-row"><span>Lv.${b.from}→${b.to} ${bl}</span><span>アメ <b>${b.c.toLocaleString()}</b> / ゆめ <b>${b.y.toLocaleString()}</b></span></div>`;
      });
    }
    resultHtml+='</div>';
  }

  const emojiPickerHtml=EMOJIS.map(e=>`<button class="emoji-btn${p.emoji===e?' sel':''}" onclick="setEmoji(${p.id},'${e}')">${e}</button>`).join('');

  return `<div class="pcard${p.checked?' checked':''}" id="pcard-${p.id}">
    <div class="pcard-header">
      <div class="chk-wrap" onclick="event.stopPropagation()">
        <input type="checkbox" ${p.checked?'checked':''} onchange="toggleCheck(${p.id})" title="集計に含める">
      </div>
      <div class="pcard-header-left" onclick="toggleCard(${p.id})">
        <div class="pcard-avatar" style="background:${avatarBg}">${p.emoji}</div>
        <div style="flex:1;min-width:0">
          <div class="pcard-name">${displayName}</div>
          <div class="pcard-meta">Lv.${p.curLv} → Lv.${p.goalLv}</div>
        </div>
        <div style="display:flex;gap:5px;align-items:center;flex-shrink:0">
          <span class="badge ${candyBadgeCls}">🍬 ${candyStr}</span>
          <span class="badge ${yumeBadgeCls}">✨ ${yumeStr}</span>
        </div>
      </div>
      <span class="chevron${p.open?' open':''}" onclick="toggleCard(${p.id})">▼</span>
    </div>
    <div class="pcard-body${p.open?' open':''}">
      <div style="margin-bottom:10px">
        <div class="form-label" style="margin-bottom:4px">アイコン</div>
        <div class="emoji-picker">${emojiPickerHtml}</div>
      </div>
      <div class="form-grid">
        <div class="form-field" style="grid-column:1/-1">
          <label class="form-label" for="name-${p.id}">ポケモン名</label>
          <input type="text" id="name-${p.id}" value="${p.name}" placeholder="例：ピカチュウ">
        </div>
        <div class="form-field">
          <label class="form-label" for="cur-${p.id}">現在のレベル</label>
          <select id="cur-${p.id}">${levelOpts(1,64,p.curLv)}</select>
        </div>
        <div class="form-field">
          <label class="form-label" for="goal-${p.id}">目標レベル</label>
          <select id="goal-${p.id}">${levelOpts(2,65,p.goalLv)}</select>
        </div>
        <div class="form-field" style="grid-column:1/-1">
          <label class="form-label" for="rem-${p.id}">次のレベルまでの経験値 <span style="font-weight:400;color:#9ca3af">(未入力=最大値)</span></label>
          <input type="number" id="rem-${p.id}" value="${p.remExp}" placeholder="未入力で最大" min="0" style="max-width:140px">
        </div>
        <div class="form-field" style="grid-column:1/-1">
          <div class="form-label">性格補正</div>
          <div class="radio-group">
            <label><input type="radio" name="nat-${p.id}" value="1.1"${p.nature==='1.1'?' checked':''}> 経験値↑↑</label>
            <label><input type="radio" name="nat-${p.id}" value="1"${p.nature==='1'?' checked':''}> 通常</label>
            <label><input type="radio" name="nat-${p.id}" value="0.9"${p.nature==='0.9'?' checked':''}> 経験値↓↓</label>
          </div>
        </div>
        <div class="form-field" style="grid-column:1/-1">
          <div class="form-label">ポケモン種別補正</div>
          <div class="radio-group">
            <label><input type="radio" name="et-${p.id}" value="1"${p.expType==='1'?' checked':''}> 通常</label>
            <label><input type="radio" name="et-${p.id}" value="1.5"${p.expType==='1.5'?' checked':''}> ×1.5倍</label>
            <label><input type="radio" name="et-${p.id}" value="1.8"${p.expType==='1.8'?' checked':''}> ×1.8倍</label>
            <label><input type="radio" name="et-${p.id}" value="2.2"${p.expType==='2.2'?' checked':''}> ×2.2倍</label>
          </div>
        </div>
      </div>
      <div class="seg-section-title">🚀 ブースト区間設定</div>
      <div>${segHtml||'<p style="font-size:12px;color:#9ca3af;padding:4px 0">区間なし（全区間ブーストなし）</p>'}</div>
      <button class="btn-add-seg" onclick="addSegment(${p.id})">＋ 区間を追加</button>
      ${resultHtml}
      <div class="pcard-actions">
        <button class="btn-calc" onclick="calcPokemon(${p.id})">計算する</button>
        <button class="btn-del-poke" onclick="deletePokemon(${p.id})">削除</button>
      </div>
    </div>
  </div>`;
}

/* ─── render total ─── */
function renderTotal(){
  const all=pokemons.filter(p=>p.result!==null);
  const checked=all.filter(p=>p.checked);
  if(all.length===0)return '';

  const totalC=checked.reduce((s,p)=>s+p.result.totalC,0);
  const totalY=checked.reduce((s,p)=>s+p.result.totalY,0);

  const uncheckedCalc=all.filter(p=>!p.checked);
  let noticeHtml='';
  if(uncheckedCalc.length>0){
    noticeHtml=`<div class="total-notice">⬛ チェックなし（集計外）：${uncheckedCalc.map(p=>`${p.emoji} ${p.name||'未入力'}`).join('、')}</div>`;
  }

  if(checked.length===0){
    return `<div class="total-card">
      <div class="total-title">🌟 集計</div>
      <p style="font-size:13px;color:#6b7280">チェックされたポケモンがいません。<br>カードのチェックボックスで集計対象を選んでください。</p>
      ${noticeHtml}
    </div>`;
  }

  const rows=checked.map(p=>`<div class="total-row"><span>${p.emoji} ${p.name||'なまえ未入力'}</span><span>🍬 ${p.result.totalC.toLocaleString()} / ✨ ${p.result.totalY.toLocaleString()}</span></div>`).join('');

  return `<div class="total-card">
    <div class="total-title">🌟 集計（${checked.length}体）</div>
    <div class="total-grid">
      <div class="total-metric"><div class="total-metric-label">🍬 アメ合計</div><div class="total-metric-val tv-candy">${totalC.toLocaleString()}<span style="font-size:13px;margin-left:3px">個</span></div></div>
      <div class="total-metric"><div class="total-metric-label">✨ ゆめのかけら合計</div><div class="total-metric-val tv-yume">${totalY.toLocaleString()}<span style="font-size:13px;margin-left:3px">個</span></div></div>
    </div>
    <div class="total-rows">${rows}</div>
    ${noticeHtml}
  </div>`;
}

/* ─── renderAll ─── */
function renderAll(){
  const list=document.getElementById('poke-list');
  const totalArea=document.getElementById('total-area');
  if(pokemons.length===0){
    list.innerHTML=`<div class="empty-state"><div class="empty-icon">🌙</div><div>「追加」ボタンからポケモンを登録して<br>アメ・ゆめのかけらを計算しましょう</div></div>`;
  } else {
    list.innerHTML=pokemons.map(renderCard).join('');
  }
  const calcedCount=pokemons.filter(p=>p.result!==null).length;
  totalArea.innerHTML=calcedCount>0?renderTotal():'';
}

renderAll();
</script>
